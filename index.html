<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb") no-repeat center center fixed;
  background-size: cover;
}

h2 { color: white; text-shadow: 0 2px 5px black; }

button {
  padding: 8px 14px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

button img {
  width: 25px;
  height: 25px;
  border-radius: 50%;
}

/* CAMERA */
#reader {
  width: 300px;
  margin: auto;
}

/* MOUNTAIN */
.mountain {
  width: 280px;
  height: 360px;
  margin: 30px auto;
  position: relative;

  background: url("https://images.unsplash.com/photo-1501785888041-af3ef285b470") center/cover;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

.mountain::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
}

/* RAMP STEPS */
.steps {
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: repeating-linear-gradient(
    to top,
    rgba(255,255,255,0.12) 0px,
    rgba(255,255,255,0.12) 2px,
    transparent 2px,
    transparent 36px
  );
  z-index: 1;
}

/* CHARACTERS */
.character {
  position: absolute;
  bottom: 0;
  width: 60px;
  transform: translateX(-50%);
  transition: bottom 0.5s ease-in-out;
  z-index: 2;
  filter: drop-shadow(0 5px 5px rgba(0,0,0,0.6));
}

.walk {
  animation: bounce 0.4s infinite alternate;
}

@keyframes bounce {
  from { transform: translateX(-50%) translateY(0px); }
  to { transform: translateX(-50%) translateY(-4px); }
}
</style>
</head>

<body>

<h2>🏔 QR Mountain Climb Game</h2>

<button onclick="startScanner()">📷 Start Camera</button>

<div id="reader"></div>

<!-- FACE BUTTONS -->
<div>
  <button onclick="manualScan('YOUNG')">
    <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">
    Young
  </button>

  <button onclick="manualScan('OLD')">
    <img src="https://cdn-icons-png.flaticon.com/512/4140/4140051.png">
    Old
  </button>
</div>

<!-- SINGLE MOUNTAIN -->
<div class="mountain">
  <div class="steps"></div>

  <img id="young" class="character"
  src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png"
  style="left:35%;">

  <img id="old" class="character"
  src="https://cdn-icons-png.flaticon.com/512/4140/4140051.png"
  style="left:65%;">
</div>

<h3 style="color:white;">QR Codes</h3>
<div id="q1"></div>
<div id="q2"></div>

<script>

let y = 0;
let o = 0;
const max = 10;

function move(id, step){
  const el = document.getElementById(id);
  const maxHeight = 320;
  const stepHeight = maxHeight / max;

  el.classList.add("walk");
  el.style.bottom = (step * stepHeight) + "px";

  setTimeout(()=> el.classList.remove("walk"), 500);
}

/* BUTTON CONTROL */
function manualScan(type){
  if(type === "YOUNG" && y < max){
    y++;
    move("young", y);
  }

  if(type === "OLD" && o < max){
    o++;
    move("old", o);
  }

  if(y === max) alert("🏆 Young reached the top!");
  if(o === max) alert("🏆 Old reached the top!");
}

/* CAMERA SCANNER */
function startScanner(){
  const scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    text => manualScan(text)
  );
}

/* QR CODES */
new QRCode(document.getElementById("q1"), "YOUNG");
new QRCode(document.getElementById("q2"), "OLD");

</script>

</body>
</html>
