<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;

  /* REAL SKY IMAGE */
  background: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb") no-repeat center center fixed;
  background-size: cover;
}

/* layout */
.container {
  display: flex;
  justify-content: center;
  gap: 60px;
  margin-top: 40px;
}

/* REALISTIC mountain using image */
.mountain {
  width: 220px;
  height: 320px;

  background: url("https://images.unsplash.com/photo-1501785888041-af3ef285b470") 
  center/cover;

  position: relative;
  border-radius: 10px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  overflow: hidden;
}

/* dark overlay for realism */
.mountain::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
}

/* character */
.character {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  transition: bottom 0.5s ease-in-out;
  z-index: 2;
  filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));
}

/* walking animation */
.walk {
  animation: bounce 0.4s infinite alternate;
}

@keyframes bounce {
  from { transform: translateX(-50%) translateY(0px); }
  to { transform: translateX(-50%) translateY(-3px); }
}
</style>
