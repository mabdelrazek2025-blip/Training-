<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: #87CEEB; /* simple sky only */
}

h2 { color: white; text-shadow: 0 2px 5px black; }

/* BUTTONS */
button {
  padding: 8px 14px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* CAMERA */
#reader {
  width: 300px;
  margin: auto;
}

/* MOUNTAIN LAYOUT */
.container {
  display: flex;
  justify-content: center;
  gap: 60px;
  margin-top: 20px;
}

/* CARTOON MOUNTAIN */
.mountain {
  width: 220px;
  height: 340px;
  position: relative;

  /* cartoon gradient */
  background: linear-gradient(to top, #6b4f2a, #caa472);
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);

  box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}

/* SNOW TOP */
.mountain::before {
  content: "";
  position: absolute;
  top: 0;
  left: 25%;
  width: 50%;
  height: 50px;
  background: white;
  border-radius: 50%;
}

/* RAMP STEPS */
.steps {
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: repeating-linear-gradient(
    to top,
    rgba(255,255,255,0.15) 0px,
    rgba(255,255,255,0.15) 2px,
    transparent 2px,
    transparent 34px
  );
}

/* CHARACTER */
.character {
  position: absolute;
  bottom: 0;
  width: 55px;
  transform: translateX(-50%);
  transition: bottom 0.5s ease-in-out;
  filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5));
}
</style>
</head>

<body>

<h2>🏔 Mountain Climb Game</h2>

<button onclick="startScanner()">📷 Start Camera</button>

<div id="reader"></div>

<!-- QR Buttons -->
<div>
  <button onclick="manual('YOUNG')">🧑 Young</button>
  <button onclick="manual('OLD')">👴 Old</button>
</div>

<!-- 2 MOUNTAINS -->
<div class="container">

  <!-- MOUNTAIN 1 -->
  <div class="mountain">
    <div class="steps"></div>

    <img id="young" class="character"
    src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png"
    style="left:50%;">
  </div>

  <!-- MOUNTAIN 2 -->
  <div class="mountain">
    <div class="steps"></div>

    <img id="old" class="character"
    src="https://cdn-icons-png.flaticon.com/512/4140/4140051.png"
    style="left:50%;">
  </div>

</div>

<h3 style="color:white;">QR Codes</h3>
<div id="q1"></div>
<div id="q2"></div>

<script>

let y = 0;
let o = 0;
const max = 10;

function move(id, step){
  const el = document.getElementById(id);
  const maxHeight = 320;
  const stepHeight = maxHeight / max;

  el.style.bottom = (step * stepHeight) + "px";
}

/* BUTTON CONTROL */
function manual(type){

  if(type === "YOUNG" && y < max){
    y++;
    move("young", y);
  }

  if(type === "OLD" && o < max){
    o++;
    move("old", o);
  }

  if(y === max) alert("🏆 Young reached top!");
  if(o === max) alert("🏆 Old reached top!");
}

/* CAMERA */
function startScanner(){
  const scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    text => manual(text)
  );
}

/* QR */
new QRCode(document.getElementById("q1"), "YOUNG");
new QRCode(document.getElementById("q2"), "OLD");

</script>

</body>
</html>
