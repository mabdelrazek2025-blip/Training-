<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body { text-align:center; font-family: Arial; }

.container {
  display: flex;
  justify-content: center;
  gap: 40px;
}

/* Mountain */
.mountain {
  width: 200px;
  height: 300px;
  background: linear-gradient(to top, #5c3d2e, #dcdcdc);
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  position: relative;
  overflow: visible;
}

/* Character */
.character {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
}

/* Body */
.body {
  width: 100%;
}

/* Legs container */
.legs {
  display: flex;
  justify-content: space-between;
  width: 40px;
  margin: auto;
}

.leg {
  width: 10px;
  height: 25px;
  background: black;
  transform-origin: top;
}

/* Walking animation */
.walk .leg-left {
  animation: walkLeft 0.4s infinite alternate;
}

.walk .leg-right {
  animation: walkRight 0.4s infinite alternate;
}

@keyframes walkLeft {
  from { transform: rotate(-20deg); }
  to { transform: rotate(20deg); }
}

@keyframes walkRight {
  from { transform: rotate(20deg); }
  to { transform: rotate(-20deg); }
}

</style>
</head>

<body>

<h2>🏔 QR Mountain Game</h2>

<button onclick="startScanner()">📷 Start Camera</button>

<div id="reader" style="width:300px;margin:auto;"></div>

<div class="container">

  <!-- Young -->
  <div class="mountain">
    <div id="young" class="character">
      <img class="body" src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">
      <div class="legs">
        <div class="leg leg-left"></div>
        <div class="leg leg-right"></div>
      </div>
    </div>
  </div>

  <!-- Old -->
  <div class="mountain">
    <div id="old" class="character">
      <img class="body" src="https://cdn-icons-png.flaticon.com/512/4140/4140051.png">
      <div class="legs">
        <div class="leg leg-left"></div>
        <div class="leg leg-right"></div>
      </div>
    </div>
  </div>

</div>

<h3>QR Codes</h3>
<div id="q1"></div>
<div id="q2"></div>

<script>
let y=0, o=0;
const max=10;

function move(id, step){
  const el = document.getElementById(id);
  const maxHeight = 260;
  const stepHeight = maxHeight / max;

  // start walking animation
  el.classList.add("walk");

  el.style.bottom = (step * stepHeight) + "px";

  // stop animation after movement
  setTimeout(()=>{
    el.classList.remove("walk");
  }, 500);
}

function startScanner(){
  const scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    text => {

      if(text==="YOUNG"){
        if(y<max){ y++; move("young",y); }
      }

      if(text==="OLD"){
        if(o<max){ o++; move("old",o); }
      }

      if(y===max) alert("🏆 Young reached the top!");
      if(o===max) alert("🏆 Old reached the top!");
    }
  ).catch(err => alert(err));
}

new QRCode(document.getElementById("q1"), "YOUNG");
new QRCode(document.getElementById("q2"), "OLD");
</script>

</body>
</html>
