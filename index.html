<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body { text-align:center; font-family: Arial; }

.container {
  display: flex;
  justify-content: center;
  gap: 40px;
}

/* Mountain */
.mountain {
  width: 200px;
  height: 300px;
  background: linear-gradient(to top, #5c3d2e, #dcdcdc);
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  position: relative;
}

/* Person image */
.person {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  transition: bottom 0.5s;
}
</style>
</head>

<body>

<h2>🏔 QR Mountain Game</h2>

<button onclick="startScanner()">📷 Start Camera</button>

<div id="reader" style="width:300px;margin:auto;"></div>

<div class="container">

  <!-- Young Man -->
  <div class="mountain">
    <img id="young" class="person"
    src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">
  </div>

  <!-- Old Man -->
  <div class="mountain">
    <img id="old" class="person"
    src="https://cdn-icons-png.flaticon.com/512/4140/4140051.png">
  </div>

</div>

<h3>QR Codes</h3>
<div id="q1"></div>
<div id="q2"></div>

<script>
let y=0, o=0;
const max=10;

function move(id, step){
  const maxHeight = 260;
  const stepHeight = maxHeight / max;
  document.getElementById(id).style.bottom = (step * stepHeight) + "px";
}

function startScanner(){
  const scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    text => {

      if(text==="YOUNG"){
        if(y<max){ y++; move("young",y); }
      }

      if(text==="OLD"){
        if(o<max){ o++; move("old",o); }
      }

      if(y===max) alert("🏆 Young reached the top!");
      if(o===max) alert("🏆 Old reached the top!");
    }
  ).catch(err => alert(err));
}

/* Generate QR */
new QRCode(document.getElementById("q1"), "YOUNG");
new QRCode(document.getElementById("q2"), "OLD");
</script>

</body>
</html>
