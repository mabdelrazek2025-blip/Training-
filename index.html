<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  text-align:center;
  background:url("https://images.unsplash.com/photo-1506744038136-46273834b3fb") no-repeat center center fixed;
  background-size:cover;
}

h2{color:white;text-shadow:0 2px 5px black;}

.container{display:flex;justify-content:center;gap:60px;margin-top:20px;}

.mountain{
  width:220px;height:360px;position:relative;
  background:linear-gradient(to top,#5a3d2b,#c9a27a);
  clip-path:polygon(50% 0%,0% 100%,100% 100%);
  overflow:hidden;
}

.character{
  position:absolute;
  bottom:0;
  left:20%;
  font-size:40px;
  transition:bottom 0.5s,left 0.5s;
}
</style>
</head>

<body>

<h2>🏔 LIVE QR Mountain Game</h2>

<div class="container">

  <div class="mountain">
    <div id="young" class="character">🧑</div>
  </div>

  <div class="mountain">
    <div id="old" class="character">👴</div>
  </div>

</div>

<script>
// 🔥 FIREBASE CONFIG (put yours here)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let y=0, o=0;
const max=10;

function move(id, step){
  let bottom = step * 30;
  let left = 20 + step * 3;

  document.getElementById(id).style.bottom = bottom+"px";
  document.getElementById(id).style.left = left+"%";
}

// 🔴 REALTIME LISTENER
db.ref("game").on("value", snap=>{
  let data = snap.val();

  if(!data) return;

  if(data.player === "young"){
    if(y < max){ y++; move("young", y); }
  }

  if(data.player === "old"){
    if(o < max){ o++; move("old", o); }
  }
});

</script>

</body>
</html>
