<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  background:url("https://images.unsplash.com/photo-1501785888041-af3ef285b470") no-repeat center center fixed;
  background-size:cover;
}

h2{
  color:white;
  text-shadow:0 2px 5px black;
}

.container{
  display:flex;
  justify-content:center;
  gap:60px;
  margin-top:20px;
}

/* mountain */
.mountain{
  width:220px;
  height:360px;
  position:relative;
  background:linear-gradient(to top,#4b2e1f,#caa27a);
  clip-path:polygon(50% 0%,0% 100%,100% 100%);
}

.mountain::before{
  content:"";
  position:absolute;
  top:0;
  left:20%;
  width:60%;
  height:50px;
  background:white;
  border-radius:50%;
}

/* characters */
.character{
  position:absolute;
  bottom:0;
  font-size:40px;
  left:20%;
  transform:translateX(-50%);
  transition:0.3s;
}

/* buttons */
.controls{
  margin-top:20px;
}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>🏔 Young and Old Man</h2>

<div class="container">

  <div class="mountain">
    <div id="young" class="character">🧑</div>
  </div>

  <div class="mountain">
    <div id="old" class="character">👴</div>
  </div>

</div>

<!-- CONTROLS -->
<div class="controls">
  <button onclick="manual('young')">⬆️ Young</button>
  <button onclick="manual('old')">⬆️ Old</button>
  <button onclick="resetGame()">🔄 Reset</button>
</div>

<script>

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://training-60289-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let y = 0;
let o = 0;
const max = 10;

function move(id, step){
  let h = 320 / max;
  document.getElementById(id).style.bottom = (step * h) + "px";
}

/* manual buttons */
function manual(player){
  db.ref("game").push({
    player: player,
    time: Date.now()
  });
}

/* reset */
function resetGame(){
  y = 0;
  o = 0;
  move("young",0);
  move("old",0);
  db.ref("game").remove();
}

/* realtime listener */
db.ref("game").on("child_added",(snap)=>{

  const data = snap.val();
  if(!data) return;

  if(data.player === "young"){
    y++;
    move("young",y);
  }

  if(data.player === "old"){
    o++;
    move("old",o);
  }

});

</script>

</body>
</html>
