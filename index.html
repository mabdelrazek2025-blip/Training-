<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb") no-repeat center center fixed;
  background-size: cover;
}

h2 {
  color: white;
  text-shadow: 0 2px 5px black;
}

button {
  padding: 8px 14px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#reader {
  width: 300px;
  margin: auto;
}

/* layout */
.container {
  display: flex;
  justify-content: center;
  gap: 60px;
  margin-top: 20px;
}

/* mountain */
.mountain {
  width: 220px;
  height: 360px;
  position: relative;
  background: linear-gradient(to top, #5a3d2b, #c9a27a);
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.mountain::before {
  content: "";
  position: absolute;
  top: 0;
  left: 25%;
  width: 50%;
  height: 45px;
  background: white;
  border-radius: 50%;
}

/* ramp lines */
.steps {
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: repeating-linear-gradient(
    to top,
    rgba(255,255,255,0.12) 0px,
    rgba(255,255,255,0.12) 2px,
    transparent 2px,
    transparent 35px
  );
}

/* CHARACTER (NOW LEFT SIDE + DIAGONAL) */
.character {
  position: absolute;
  left: -30px; /* 👈 outside left of mountain */
  bottom: 0;

  font-size: 40px;
  transform: translateX(-50%);
  transition: bottom 0.5s ease, left 0.5s ease;
  filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5));
}
</style>
</head>

<body>

<h2>🏔 Diagonal Mountain Climb Game</h2>

<button onclick="startScanner()">📷 Start Camera</button>

<div id="reader"></div>

<div>
  <button onclick="manual('YOUNG')">🧑 Young</button>
  <button onclick="manual('OLD')">👴 Old</button>
</div>

<div class="container">

  <!-- MOUNTAIN 1 -->
  <div class="mountain">
    <div class="steps"></div>
    <div id="young" class="character">🧑</div>
  </div>

  <!-- MOUNTAIN 2 -->
  <div class="mountain">
    <div class="steps"></div>
    <div id="old" class="character">👴</div>
  </div>

</div>

<h3 style="color:white;">QR Codes</h3>
<div id="q1"></div>
<div id="q2"></div>

<script>

let y = 0;
let o = 0;
const max = 10;

/* DIAGONAL MOVE */
function move(id, step, offset){
  const el = document.getElementById(id);

  const maxHeight = 320;
  const stepHeight = maxHeight / max;

  // vertical movement
  let bottom = step * stepHeight;

  // diagonal movement (moves slightly right as it climbs)
  let left = -30 + (step * 8);

  el.style.bottom = bottom + "px";
  el.style.left = left + "px";
}

/* CONTROL */
function manual(type){

  if(type === "YOUNG" && y < max){
    y++;
    move("young", y);
  }

  if(type === "OLD" && o < max){
    o++;
    move("old", o);
  }

  if(y === max) alert("🏆 Young reached top!");
  if(o === max) alert("🏆 Old reached top!");
}

/* CAMERA */
function startScanner(){
  const scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    text => manual(text)
  );
}

/* QR */
new QRCode(document.getElementById("q1"), "YOUNG");
new QRCode(document.getElementById("q2"), "OLD");

</script>

</body>
</html>
