<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Mountain Game</title>

<style>
body { margin: 0; overflow: hidden; }
#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 10;
}

button {
  padding: 10px;
  margin: 5px;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

<div id="ui">
  <button onclick="moveUp('young')">🧑 Young</button>
  <button onclick="moveUp('old')">👴 Old</button>
</div>

<script>

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// CAMERA
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 3, 8);

// RENDERER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 5);
scene.add(light);

// ===== 3D MOUNTAIN =====
const mountainGeometry = new THREE.ConeGeometry(3, 8, 8);
const mountainMaterial = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
const mountain = new THREE.Mesh(mountainGeometry, mountainMaterial);
scene.add(mountain);

// SNOW TOP
const snowGeometry = new THREE.SphereGeometry(0.8, 16, 16);
const snowMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
const snow = new THREE.Mesh(snowGeometry, snowMaterial);
snow.position.y = 4;
scene.add(snow);

// ===== CHARACTERS =====
const young = new THREE.Mesh(
  new THREE.BoxGeometry(0.5, 0.5, 0.5),
  new THREE.MeshStandardMaterial({ color: 0x00ff00 })
);
young.position.set(-1, -3, 0);
scene.add(young);

const old = new THREE.Mesh(
  new THREE.BoxGeometry(0.5, 0.5, 0.5),
  new THREE.MeshStandardMaterial({ color: 0x0000ff })
);
old.position.set(1, -3, 0);
scene.add(old);

// ===== MOVEMENT =====
let yStep = 0;
let oStep = 0;

function moveUp(type){
  const stepSize = 0.6;

  if(type === "young"){
    yStep++;
    young.position.y += stepSize;
  }

  if(type === "old"){
    oStep++;
    old.position.y += stepSize;
  }

  if(yStep >= 10) alert("🏆 Young reached top!");
  if(oStep >= 10) alert("🏆 Old reached top!");
}

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
