<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Mountain Physics Game</title>

<style>
body { margin: 0; overflow: hidden; }
#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 10;
}

button {
  padding: 10px;
  margin: 5px;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

<div id="ui">
  <button onclick="walk('young')">🧑 Young Walk</button>
  <button onclick="walk('old')">👴 Old Walk</button>
</div>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 3, 8);

// RENDERER
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

// ================= MOUNTAIN =================
const mountain = new THREE.Mesh(
  new THREE.ConeGeometry(4, 10, 16),
  new THREE.MeshStandardMaterial({ color: 0x8B5A2B })
);
scene.add(mountain);

// SNOW TOP
const snow = new THREE.Mesh(
  new THREE.SphereGeometry(1, 16, 16),
  new THREE.MeshStandardMaterial({ color: 0xffffff })
);
snow.position.y = 5;
scene.add(snow);

// ================= PLAYER CLASS =================
class Player {
  constructor(color, x) {
    this.mesh = new THREE.Mesh(
      new THREE.BoxGeometry(0.5,0.5,0.5),
      new THREE.MeshStandardMaterial({ color })
    );

    this.mesh.position.set(x, -4, 0);

    this.velocityY = 0;
    this.gravity = -0.02;
    this.jumpPower = 0.25;
    this.grounded = false;

    scene.add(this.mesh);
  }

  update() {
    // gravity
    this.velocityY += this.gravity;
    this.mesh.position.y += this.velocityY;

    // mountain ground collision (simple slope limit)
    const groundLevel = -4 + (this.mesh.position.y + 4) * 0.15;

    if (this.mesh.position.y <= groundLevel) {
      this.mesh.position.y = groundLevel;
      this.velocityY = 0;
      this.grounded = true;
    } else {
      this.grounded = false;
    }
  }

  walk() {
    if (this.grounded) {
      this.velocityY = this.jumpPower; // small climb step
    }
  }
}

// ================= PLAYERS =================
const young = new Player(0x00ff00, -1);
const old = new Player(0x0000ff, 1);

// ================= CONTROLS =================
function walk(type){
  if(type === "young") young.walk();
  if(type === "old") old.walk();
}

// ================= LOOP =================
function animate(){
  requestAnimationFrame(animate);

  young.update();
  old.update();

  renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
