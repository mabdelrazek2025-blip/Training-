<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  text-align:center;
  background:#87CEEB;
}

.container {
  display:flex;
  justify-content:center;
  gap:60px;
  margin-top:30px;
}

.mountain {
  width:200px;
  height:350px;
  position:relative;
  background: linear-gradient(to top,#6b4f2a,#caa472);
  clip-path: polygon(50% 0%,0% 100%,100% 100%);
}

.character {
  position:absolute;
  bottom:0;
  left:40%;
  font-size:40px;
  transition: bottom 0.5s;
}
</style>
</head>

<body>

<h2>🏔 QR Phone-Control Game</h2>

<div class="container">

  <div class="mountain">
    <div id="young" class="character">🧑</div>
  </div>

  <div class="mountain">
    <div id="old" class="character">👴</div>
  </div>

</div>

<script>
// 🔥 FIREBASE CONFIG (replace with yours)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// movement function
let y=0, o=0;

function move(el, step){
  let bottom = step * 30;
  document.getElementById(el).style.bottom = bottom + "px";
}

// 🔴 LISTEN REAL TIME FROM PHONE
db.ref("game").on("value", (snap)=>{

  let data = snap.val();

  if(data?.player === "young"){
    y++;
    move("young", y);
  }

  if(data?.player === "old"){
    o++;
    move("old", o);
  }

});

</script>

</body>
</html>
