<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  background:#87CEEB;
}

.container{
  display:flex;
  justify-content:center;
  gap:60px;
  margin-top:30px;
}

.mountain{
  width:220px;
  height:360px;
  position:relative;
  background:linear-gradient(to top,#5a3d2b,#c9a27a);
  clip-path:polygon(50% 0%,0% 100%,100% 100%);
}

.character{
  position:absolute;
  bottom:0;
  font-size:40px;
  left:20%;
  transform:translateX(-50%);
  transition:0.3s;
}
</style>
</head>

<body>

<h2>🏔 QR Mountain Game</h2>

<div class="container">
  <div class="mountain">
    <div id="young" class="character">🧑</div>
  </div>

  <div class="mountain">
    <div id="old" class="character">👴</div>
  </div>
</div>

<script>

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://training-60289-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let y = 0;
let o = 0;
const max = 10;

function move(id, step){
  let h = 320 / max;
  document.getElementById(id).style.bottom = (step * h) + "px";
  document.getElementById(id).style.left = (20 + step * 3) + "%";
}

/* REAL TIME FIXED LISTENER */
db.ref("game").on("child_added", (snap) => {

  const data = snap.val();
  if (!data) return;

  if (data.player === "young") {
    y++;
    move("young", y);
  }

  if (data.player === "old") {
    o++;
    move("old", o);
  }

});

</script>

</body>
</html>
