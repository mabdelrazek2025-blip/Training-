<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  text-align: center;
  /* Using the high-quality clear mountain image */
  background: url("http://googleusercontent.com/image_collection/image_retrieval/12880971118604804001_0") no-repeat center center fixed;
  background-size: cover;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

h2 {
  color: white;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
  margin-top: 20px;
  font-size: 2.2rem;
  letter-spacing: 1px;
}

/* The area where emojis climb the path */
.game-area {
  position: relative;
  flex-grow: 1;
  width: 100%;
}

.character {
  position: absolute;
  font-size: 55px;
  transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  filter: drop-shadow(0 8px 4px rgba(0,0,0,0.4));
  bottom: 12%; /* Start at the bottom of the path */
}

/* Start positions at the beginning of the trail */
#young { left: 35%; }
#old { left: 55%; }

/* Score and Control Bar */
.footer-controls {
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(8px);
  padding: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  border-top: 2px solid rgba(255,255,255,0.1);
}

.card {
  border: none;
  border-radius: 15px;
  color: white;
  padding: 12px 25px;
  cursor: pointer;
  transition: transform 0.1s, background 0.3s;
  min-width: 150px;
}

.card:hover { opacity: 0.9; }
.card:active { transform: scale(0.92); }

.blue { background: #1E88E5; box-shadow: 0 5px #1565C0; }
.orange { background: #FB8C00; box-shadow: 0 5px #EF6C00; }
.reset { background: #E53935; padding: 15px; border-radius: 50%; box-shadow: 0 5px #B71C1C; }

.card-title { font-size: 13px; display: block; text-transform: uppercase; margin-bottom: 4px; }
.score-val { font-size: 28px; font-weight: 800; }

</style>
</head>

<body>

<h2>🏔 MOUNTAIN CHALLENGE</h2>

<div class="game-area">
  <div id="young" class="character">🧑‍🦱</div>
  <div id="old" class="character">👴</div>
</div>

<div class="footer-controls">
  <button class="card blue" onclick="manual('young')">
    <span class="card-title">Young Man</span>
    <span id="y-score" class="score-val">0</span>
  </button>
  
  <button class="card orange" onclick="manual('old')">
    <span class="card-title">Old Man</span>
    <span id="o-score" class="score-val">0</span>
  </button>

  <button class="card reset" onclick="resetGame()">🔄</button>
</div>

<script>
// --- REPLACE WITH YOUR ACTUAL FIREBASE CONFIG ---
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://training-60289-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let y = 0;
let o = 0;
const maxSteps = 10;

function move(id, steps) {
  const char = document.getElementById(id);
  const scoreText = document.getElementById(id === 'young' ? 'y-score' : 'o-score');
  
  scoreText.innerText = steps;

  // Move characters UP and follow the "winding" mountain path
  let verticalPos = 12 + (steps * 7); // Moves from 12% to 82% height
  
  // This math creates a slight "zigzag" to follow a path
  let zigzag = (steps % 2 === 0) ? 2 : -2; 
  let horizontalPos = (id === 'young' ? 35 : 55) + zigzag;

  char.style.bottom = verticalPos + "%";
  char.style.left = horizontalPos + "%";
  
  // Scale them down as they get further away (perspective)
  let scale = 1 - (steps * 0.04);
  char.style.transform = `scale(${scale})`;
}

function manual(player){
  db.ref("game").push({
    player: player,
    time: Date.now()
  });
}

function resetGame(){
  db.ref("game").remove();
}

// Listen for actual data changes
db.ref("game").on("child_added", (snap) => {
  const data = snap.val();
  if(!data) return;

  if(data.player === "young") {
    y++;
    move("young", y);
  } else if(data.player === "old") {
    o++;
    move("old", o);
  }
});

// Listener for the reset button (clears screen for everyone)
db.ref("game").on("value", (snap) => {
  if(!snap.exists()) {
    y = 0; o = 0;
    move("young", 0);
    move("old", 0);
  }
});

</script>

</body>
</html>
