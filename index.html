<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  text-align: center;
  /* This looks for a file named mountain.jpg in your folder */
  background: url("mountain.jpg") no-repeat center center fixed;
  background-size: cover;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

h2 {
  color: white;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
  margin-top: 20px;
  font-size: 2rem;
}

/* The invisible area where characters move */
.game-area {
  position: relative;
  flex-grow: 1;
  width: 100%;
}

.character {
  position: absolute;
  font-size: 60px;
  transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  filter: drop-shadow(0 10px 5px rgba(0,0,0,0.3));
  bottom: 15%; /* Starting height */
}

#young { left: 25%; }
#old { right: 25%; }

/* Bottom Control Bar */
.footer-controls {
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(5px);
  padding: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
}

.card {
  border: none;
  border-radius: 12px;
  color: white;
  padding: 15px 30px;
  cursor: pointer;
  transition: transform 0.1s;
  min-width: 140px;
}

.card:active { transform: scale(0.95); }

.blue { background: #2196F3; box-shadow: 0 4px #1976D2; }
.orange { background: #FF9800; box-shadow: 0 4px #F57C00; }
.reset { background: #f44336; padding: 15px; border-radius: 50%; }

.card-title { font-size: 14px; display: block; opacity: 0.9; }
.score-val { font-size: 24px; font-weight: bold; }

</style>
</head>

<body>

<h2>🏔 Mountain Challenge</h2>

<div class="game-area">
  <div id="young" class="character">🧑‍🦱</div>
  <div id="old" class="character">👴</div>
</div>

<div class="footer-controls">
  <button class="card blue" onclick="manual('young')">
    <span class="card-title">Young Man</span>
    <span id="y-score" class="score-val">0</span>
  </button>
  
  <button class="card orange" onclick="manual('old')">
    <span class="card-title">Old Man</span>
    <span id="o-score" class="score-val">0</span>
  </button>

  <button class="card reset" onclick="resetGame()">🔄</button>
</div>

<script>
// --- PASTE YOUR ACTUAL FIREBASE CONFIG HERE ---
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://training-60289-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let y = 0;
let o = 0;
const maxSteps = 10;

function move(id, steps) {
  const char = document.getElementById(id);
  const scoreText = document.getElementById(id === 'young' ? 'y-score' : 'o-score');
  
  scoreText.innerText = steps;

  // Calculate movement
  // Higher steps move the characters UP and slightly toward the CENTER path
  let up = 15 + (steps * 6); // Moves from 15% to 75% height
  let centerIn = 25 + (steps * 1.5); // Moves slightly inward

  char.style.bottom = up + "%";
  
  if(id === 'young') {
      char.style.left = centerIn + "%";
  } else {
      char.style.right = centerIn + "%";
  }
}

function manual(player){
  db.ref("game").push({
    player: player,
    time: Date.now()
  });
}

function resetGame(){
  db.ref("game").remove();
  y = 0;
  o = 0;
  move("young", 0);
  move("old", 0);
}

// Listen for database updates
db.ref("game").on("child_added", (snap) => {
  const data = snap.val();
  if(!data) return;

  if(data.player === "young") {
    y++;
    move("young", y);
  } else if(data.player === "old") {
    o++;
    move("old", o);
  }
});

// Listener for reset
db.ref("game").on("value", (snap) => {
  if(!snap.exists()) {
    y = 0; o = 0;
    move("young", 0);
    move("old", 0);
  }
});

</script>

</body>
</html>
