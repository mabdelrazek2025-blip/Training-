<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  /* Use your uploaded image filename here */
  background: url("WhatsApp Image 2026-04-21 at 9.58.14 PM (1).jpeg") no-repeat center center fixed;
  background-size: cover;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

h2 {
  color: white;
  text-shadow: 0 4px 10px rgba(0,0,0,0.5);
  margin-top: 20px;
}

/* The Game Area */
.game-area {
  position: relative;
  width: 100%;
  height: 60vh; /* Adjust height to fit the mountain in the image */
}

/* Characters */
.character {
  position: absolute;
  font-size: 50px;
  transition: all 0.5s ease-out;
  filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
}

/* Starting positions for the characters on the path */
#young {
  bottom: 10%;
  left: 30%;
}

#old {
  bottom: 10%;
  right: 30%;
}

/* Controls at the bottom */
.controls {
  background: rgba(0, 0, 0, 0.4);
  padding: 20px;
  display: flex;
  justify-content: center;
  gap: 20px;
}

.score-card {
  padding: 15px 40px;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  border: none;
  font-size: 1.2rem;
}

.blue-btn { background: #1e88e5; }
.orange-btn { background: #e65100; }
.reset-btn { background: #f44336; }

</style>
</head>

<body>

<h2>🏔 Mountain Challenge</h2>

<div class="game-area">
  <div id="young" class="character">🧑‍🦱</div>
  <div id="old" class="character">👴</div>
</div>

<div class="controls">
  <button class="score-card blue-btn" onclick="manual('young')">
    Young Man <br> <span id="y-score">0</span>
  </button>
  
  <button class="score-card orange-btn" onclick="manual('old')">
    Old Man <br> <span id="o-score">0</span>
  </button>

  <button class="score-card reset-btn" onclick="resetGame()">🔄</button>
</div>

<script>
// --- KEEP YOUR FIREBASE CONFIG HERE ---
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://training-60289-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let y = 0;
let o = 0;
const max = 10;

function move(id, step) {
  const char = document.getElementById(id);
  const scoreSpan = document.getElementById(id === 'young' ? 'y-score' : 'o-score');
  
  // Update Score Text
  scoreSpan.innerText = step;

  // Move character up the mountain
  // This moves them vertically and slightly inward to follow the path
  let verticalMove = 10 + (step * 7); 
  char.style.bottom = verticalMove + "%";
  
  if(id === 'young') {
      char.style.left = (30 + (step * 2)) + "%";
  } else {
      char.style.right = (30 + (step * 2)) + "%";
  }
}

/* manual buttons */
function manual(player){
  db.ref("game").push({
    player: player,
    time: Date.now()
  });
}

/* reset */
function resetGame(){
  y = 0;
  o = 0;
  move("young", 0);
  move("old", 0);
  db.ref("game").remove();
}

/* realtime listener */
db.ref("game").on("child_added",(snap)=>{
  const data = snap.val();
  if(!data) return;

  if(data.player === "young"){
    y++;
    move("young", y);
  }

  if(data.player === "old"){
    o++;
    move("old", o);
  }
});

</script>

</body>
</html>
