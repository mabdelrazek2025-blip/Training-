<!DOCTYPE html>
<html>
<head>
  <base target="_top">

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body { font-family: Arial; text-align: center; }

    /* REAL triangle mountain */
    .mountain {
      width: 0;
      height: 0;
      border-left: 120px solid transparent;
      border-right: 120px solid transparent;
      border-bottom: 300px solid #8B4513;
      position: relative;
      display: inline-block;
      margin: 40px;
    }

    .man {
      position: absolute;
      bottom: 0;
      left: -15px;
      font-size: 30px;
      transition: bottom 0.5s;
    }
  </style>
</head>

<body>

<h2>🏔 QR Mountain Climb</h2>

<button onclick="startScanner()">📷 Start Camera</button>

<div id="reader" style="width:300px;margin:auto;"></div>

<h3>Mountains</h3>

<div class="mountain">
  <div id="youngMan" class="man">🧑</div>
</div>

<div class="mountain">
  <div id="oldMan" class="man">👴</div>
</div>

<h3>QR Codes</h3>
<p>Scan each 10 times to reach the top</p>

<div id="qrYoung"></div>
<div id="qrOld"></div>

<script>
let youngSteps = 0;
let oldSteps = 0;
const maxSteps = 10;

function moveMan(id, steps) {
  const man = document.getElementById(id);
  const maxHeight = 260; // height of triangle
  const stepHeight = maxHeight / maxSteps;
  man.style.bottom = (steps * stepHeight) + "px";
}

function startScanner() {
  const scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {

      console.log("Scanned:", decodedText);

      if (decodedText === "YOUNG_MAN") {
        if (youngSteps < maxSteps) {
          youngSteps++;
          moveMan("youngMan", youngSteps);
        }
      }

      if (decodedText === "OLD_MAN") {
        if (oldSteps < maxSteps) {
          oldSteps++;
          moveMan("oldMan", oldSteps);
        }
      }

      if (youngSteps === maxSteps) alert("🏆 Young man reached the top!");
      if (oldSteps === maxSteps) alert("🏆 Old man reached the top!");

    },
    (err) => {
      console.log(err);
    }
  ).catch(err => {
    alert("Camera error: " + err);
  });
}

function generateQR() {
  new QRCode(document.getElementById("qrYoung"), "YOUNG_MAN");
  new QRCode(document.getElementById("qrOld"), "OLD_MAN");
}

window.onload = generateQR;
</script>

</body>
</html>
