<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #87CEEB;
  padding-top: 50px;
}

.box {
  background: white;
  padding: 20px;
  margin: auto;
  width: 80%;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="box">
  <h2>📱 QR Control</h2>
  <p id="status">Loading...</p>
</div>

<script>
try {

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://training-60289-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const url = new URLSearchParams(window.location.search);
const player = url.get("player");

if (!player) {
  document.getElementById("status").innerText = "❌ No player found";
} else {

  document.getElementById("status").innerText = "Sending: " + player;

  /* IMPORTANT FIX: PUSH instead of SET */
  db.ref("game").push({
    player: player,
    time: Date.now()
  });

  setTimeout(() => {
    document.getElementById("status").innerText = "Sent ✔ " + player;
  }, 800);
}

} catch (e) {
  document.body.innerHTML = "<h3>Error</h3><p>" + e.message + "</p>";
}
</script>

</body>
</html>
